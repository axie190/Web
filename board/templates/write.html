{% extends "base.html" %}
{% block title %}{{ '글 수정' if editing else '글쓰기' }}{% endblock %}
{% block content %}
  <!--
    글쓰기 화면이랑 글수정 화면을 폼 하나로 같이 씁니다.
    editing 값이 있으면 수정 모드로 보고, 폼이 보내지는 주소(action)랑
    버튼 글자만 다르게 바꿔서 재사용했습니다.
  -->
  <h1 class="board-title">{{ '글 수정' if editing else '글쓰기' }}</h1>

  {% if error %}
    <p class="form-error">{{ error }}</p>
  {% endif %}

  <form
    class="post-form"
    method="post"
    action="{{ url_for('edit_post', post_id=post.id) if editing else url_for('new_post') }}"
  >
    <div class="post-form__row">
      <label for="title">제목</label>
      <input
        type="text"
        id="title"
        name="title"
        maxlength="200"
        required
        value="{{ post.title if post else '' }}"
      />
    </div>

    <div class="post-form__row">
      <label for="author">작성자</label>
      <input
        type="text"
        id="author"
        name="author"
        maxlength="50"
        placeholder="익명"
        value="{{ post.author if post else '' }}"
      />
    </div>

    {% if editing %}
      <!-- 수정 버튼을 눌렀을 때 이미 비밀번호를 확인했기 때문에, 여기서는 다시 안 물어보고
           확인된 비밀번호를 그대로 hidden으로 실어서 같이 제출합니다. -->
      <input type="hidden" name="password" value="{{ password }}" />
    {% else %}
      <div class="post-form__row">
        <label for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          name="password"
          maxlength="50"
          required
          placeholder="수정/삭제할 때 필요한 비밀번호"
        />
      </div>
    {% endif %}

    <div class="post-form__row">
      <label for="content">내용</label>
      <textarea id="content" name="content" rows="12" required>{{ post.content if post else '' }}</textarea>
    </div>

    <div class="post-form__actions">
      <a
        href="{{ url_for('view_post', post_id=post.id) if editing else url_for('list_posts') }}"
        class="btn btn--gray"
      >취소</a>
      <button type="submit" class="btn btn--point">{{ '수정 완료' if editing else '등록' }}</button>
    </div>
  </form>
{% endblock %}
