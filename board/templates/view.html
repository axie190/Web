{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
  <!-- 글 상세보기. 이 페이지에 들어올 때마다 app.py에서 조회수를 1씩 올려줍니다 -->
  <article class="post-view">
    <h1 class="post-view__title">{{ post.title }}</h1>
    <div class="post-view__meta">
      <span>{{ post.author }}</span>
      <span>{{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
      <span>조회 {{ post.views }}</span>
    </div>
    <div class="post-view__content">{{ post.content }}</div>

    <div class="post-view__actions">
      <a href="{{ url_for('list_posts') }}" class="btn btn--gray">목록</a>
      <!-- prompt()는 브라우저 기본 창이라 입력한 비밀번호가 그대로 보여서,
           비밀번호 칸이 가려지는(●) 작은 팝업창을 직접 만들어서 대신 씁니다. -->
      <button type="button" class="btn btn--gray" onclick="goEdit()">수정</button>
      <form
        method="post"
        action="{{ url_for('delete_post', post_id=post.id) }}"
        id="deleteForm"
      >
        <input type="hidden" name="password" id="deletePassword" />
      </form>
      <button type="button" class="btn btn--danger" onclick="doDelete()">삭제</button>
    </div>
  </article>

  <!-- 비밀번호 입력용 팝업창. 평소엔 숨겨뒀다가 JS로 보였다 안 보였다 합니다 -->
  <div id="passwordModal" class="password-modal">
    <div class="password-modal__box">
      <p>비밀번호를 입력하세요</p>
      <input
        type="password"
        id="passwordModalInput"
        onkeydown="if (event.key === 'Enter') confirmPasswordModal();"
      />
      <div class="password-modal__actions">
        <button type="button" class="btn btn--gray" onclick="cancelPasswordModal()">취소</button>
        <button type="button" class="btn btn--point" onclick="confirmPasswordModal()">확인</button>
      </div>
    </div>
  </div>

  <script>
    // 수정/삭제를 누르면 실제로 무슨 동작을 할지를 여기 잠깐 저장해뒀다가,
    // 팝업에서 비밀번호를 확인 누르면 그 동작을 실행합니다.
    let passwordModalCallback = null;

    function askPassword(callback) {
      passwordModalCallback = callback;
      document.getElementById("passwordModalInput").value = "";
      document.getElementById("passwordModal").style.display = "flex";
      document.getElementById("passwordModalInput").focus();
    }

    function cancelPasswordModal() {
      document.getElementById("passwordModal").style.display = "none";
      passwordModalCallback = null;
    }

    function confirmPasswordModal() {
      const pw = document.getElementById("passwordModalInput").value;
      document.getElementById("passwordModal").style.display = "none";
      if (pw && passwordModalCallback) {
        passwordModalCallback(pw);
      }
    }

    function goEdit() {
      askPassword(function (pw) {
        location.href = "{{ url_for('edit_post', post_id=post.id) }}?pw=" + encodeURIComponent(pw);
      });
    }

    function doDelete() {
      askPassword(function (pw) {
        if (!confirm("이 글을 삭제할까요?")) return;
        document.getElementById("deletePassword").value = pw;
        document.getElementById("deleteForm").submit();
      });
    }
  </script>
{% endblock %}
